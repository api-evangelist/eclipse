specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Eclipse Foundation
providerId: eclipse
publisherName: Eclipse Foundation
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Eclipse Foundation
  - Foundation
  - Open Source
  - Standards
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the Eclipse Foundation API surface. Provides a FOCUS-aligned
  mapping for cost allocation, usage measurement, and unit-economics reporting across the provider's APIs.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Eclipse Foundation
  ServiceCategory: Developer Tools / API
  ProviderName: Eclipse Foundation
  PublisherName: Eclipse Foundation
  InvoiceIssuerName: Eclipse Foundation
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
  - name: compute_seconds
    description: Server-side compute consumed by the request, where applicable
    unit: second
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
apis:
  - name: Eclipse Marketplace API
    baseURL: https://marketplace.eclipse.org/api/p
    tags:
      - Extensions
      - IDE
      - Marketplace
      - Plugins
    serviceName: Eclipse Marketplace API
    serviceCategory: API
  - name: Eclipse Foundation Web API
    baseURL: https://api.eclipse.org/
    tags:
      - Foundation
      - Metadata
      - Projects
      - Releases
    serviceName: Eclipse Foundation Web API
    serviceCategory: API
  - name: Eclipse Projects API
    baseURL: https://projects.eclipse.org/api/
    tags:
      - Metadata
      - Projects
      - Releases
    serviceName: Eclipse Projects API
    serviceCategory: API
  - name: Open VSX Registry API
    baseURL: https://open-vsx.org/api
    tags:
      - Extensions
      - Open Source
      - Registry
      - VS Code
    serviceName: Open VSX Registry API
    serviceCategory: API
  - name: Eclipse Newsroom REST API
    baseURL: https://newsroom.eclipse.org/api/
    tags:
      - Events
      - News
      - Newsroom
    serviceName: Eclipse Newsroom REST API
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
maintainers:
  - FN: Eclipse Foundation
    email: webmaster@eclipse.org
    url: https://www.eclipse.org/org/foundation/contact.php
